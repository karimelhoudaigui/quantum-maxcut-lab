services:
  api:
    image: python:3.11-slim
    working_dir: /workspace
    command: sh -c "pip install --no-cache-dir -r requirements.txt && uvicorn api.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    volumes:
      - .:/workspace

  app:
    image: node:20-slim
    working_dir: /workspace/app
    command: sh -c "npm install && npm run dev"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - .:/workspace
    depends_on:
      - api
